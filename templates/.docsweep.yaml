# docsweep プロジェクト設定サンプル（.docsweep.yaml）
#
# このファイルは「置いた時だけ効く」部分上書き層です。
# 優先順位: ① CLI フラグ > ② このファイル > ③ グローバル ~/.docsweep/config.yaml
# 無い項目はグローバル／内蔵デフォルトを継承します。グローバルだけ書けば体感 1 層。

# スキャンルート（このプロジェクトを単体で回すなら通常は不要。横断は global 側に書く）
# roots:
#   - .

# --- SQLite 索引が走査するプロジェクトルート群（wings / C1） ---
# 通常はグローバル ~/.docsweep/config.yaml に書く（横断索引のため）。
# プロジェクト .docsweep.yaml で上書きするケースは稀。
# projects:
#   search_paths:
#     - C:/dev/github/public/*
#     - C:/dev/github/private/*
#     - C:/dev/work/*
#   exclude:
#     - "**/node_modules/**"
#     - "**/archive-vault/**"

# --- capture (会話履歴 → 草案抽出) の LLM provider（wings / C2） ---
# 既定 "mock" でヒューリスティック / Mock LLM が動く。実 provider は別 plan で対応。
# llm:
#   provider: mock
#   model: null

# archive の移送先（プロジェクト直下からの相対）。既定 archive/
# archive_dir: archive

# 独自除外グロブ（.gitignore とは別に効く）。archive 自身は常に除外される。
# ignore:
#   - "**/drafts/**"

# .gitignore を尊重するか（既定 true）
# use_gitignore: true

# プロジェクト境界マーカー（最寄りの祖先がこれを持てばそこがプロジェクト）。
# フォルダ構成を決め打ちせず、開発者が既に定義済みの実体（gitリポジトリ等）で判定する。
# 既定: [.git, .docsweep.yaml, package.json, pyproject.toml]
# project_markers:
#   - .git
#   - pyproject.toml

# 表示・注入テンプレの言語（ja | en）。検出は多言語なので横断スキャンは言語混在可。
# lang: ja

# --- 状態モデル（states）: 唯一の正本。検出・archive 可否・Web 表示・注入を全部導出 ---
# 内蔵デフォルトで動くので通常は書かない。上書き・追加・言語追加だけで差分運用できる。
# states:
#   - key: planned
#     labels: { ja: 計画, en: Planned }
#     archive: false
#     auto_move: false
#   - key: done
#     labels: { ja: 完了, en: Done }
#     archive: true
#     auto_move: true

# --- 期日（due）と看板方式 ---
# frontmatter に `due: YYYY-MM-DD` を入れたファイルだけが看板ボードと先送り管理の対象になる。
# 既存 MD を遡及書き換えしないために、未記入 = 締切管理対象外として温存する設計。
# due:
#   # 新規生成時に AI が自動付与する初期 due（今日 + N 日）。AI 側のショートカット用ヒント。
#   default_offset_days:
#     plan: 7
#     pending: 14
#     bugfix_watching: 7
#   # 先送り回数のしきい値（Web UI のカード色分け）
#   postpone_warn_threshold: 3    # 黄色化
#   postpone_alert_threshold: 5   # 赤色化・廃止候補色

# --- Web UI 看板 ---
# web_ui:
#   keyboard_shortcuts_enabled: true   # 数字キー (1-6) でラベル変更、d/w/m で +1d/+1w/+1m

