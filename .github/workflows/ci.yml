# Continuous Integration
#
# トリガー: 全 push / pull_request
# 目的:    lint (ruff) / test (pytest) / typecheck (mypy) を回して
#          リグレッションを PR 段階で検出する。
# 段階導入: mypy は初回 continue-on-error（赤許容）。ruff / pytest は fail on error。

name: CI

on: [push, pull_request]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        # resurrect は torch を引きずるので省く。watch は Windows 限定の watchdog なので省く。
        run: pip install -e ".[dev,web,mcp,review]"

      - name: Run pytest
        run: pytest -q

      - name: Run ruff
        run: ruff check docsweep tests

      - name: Run mypy
        # 段階導入: 初回は赤許容（continue-on-error）。将来的に外す。
        continue-on-error: true
        run: mypy docsweep
